name: Django CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:

    runs-on: ubuntu-latest
    strategy:
      max-parallel: 4
      matrix:
        include:
          - python-version: "3.9"
            django-version: Django==4.2

          - python-version: "3.10"
            django-version: Django==4.2

          - python-version: "3.10"
            django-version: Django==5.0

          - python-version: "3.11"
            django-version: Django==4.2

          - python-version: "3.11"
            django-version: Django==5.0

          - python-version: "3.12"
            django-version: Django==4.2

          - python-version: "3.12"
            django-version: Django==5.0

          - python-version: "3.13"
            django-version: Django==5.1
    steps:
    - uses: actions/checkout@v5
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install uv
      uses: astral-sh/setup-uv@v7
      with:
        enable-cache: true
    - name: Install dependencies
      run: |
        uv sync --locked --all-extras --dev
        uv pip install ${{ matrix.django-version }}
    - name: Run Tests
      run: |
        uv run coverage run runtests.py
        uv run coverage report
    - name: Minimize uv cache
      run: uv cache prune --ci
